<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>할 일 목록</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;--surface:#ffffff;--surface2:#f1efe8;
  --text:#1a1a18;--text2:#5f5e5a;--text3:#888780;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --radius:8px;--radius-lg:12px;
  --red:#E24B4A;--red-light:#FCEBEB;--red-dark:#A32D2D;
  --amber:#EF9F27;--amber-light:#FAEEDA;--amber-dark:#854F0B;
  --green:#639922;--green-light:#EAF3DE;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--surface:#28281f;--surface2:#333329;
    --text:#f0ede6;--text2:#b4b2a9;--text3:#888780;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
    --red-light:#3a1a1a;--amber-light:#2d2010;--green-light:#1a2a0a;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
.container{max-width:720px;margin:0 auto;padding:1.5rem 1rem 4rem}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.header h1{font-size:20px;font-weight:600;letter-spacing:-.3px}
.stats{display:flex;gap:6px}
.stat{background:var(--surface2);border-radius:var(--radius);padding:5px 10px;font-size:12px;color:var(--text2)}
.stat b{color:var(--text);margin-right:3px}
.progress-wrap{margin-bottom:1.25rem}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--text);border-radius:2px;transition:width .4s}
.progress-label{font-size:11px;color:var(--text3);margin-top:4px;text-align:right}
.toolbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.search-wrap{flex:1;min-width:140px;position:relative}
.search-wrap input{width:100%;padding-left:30px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px 8px 30px;font-size:13px;color:var(--text);outline:none}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
select{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;font-size:13px;color:var(--text);cursor:pointer;outline:none}
.btn{padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;transition:background .15s}
.btn-primary{background:var(--text);color:var(--bg);border-color:transparent;font-weight:500}
.btn-sm{padding:5px 10px;font-size:12px}
.tabs{display:flex;gap:0;margin-bottom:1rem;border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;width:fit-content}
.tab{padding:6px 18px;font-size:13px;cursor:pointer;border:none;background:transparent;color:var(--text2)}
.tab.active{background:var(--text);color:var(--bg);font-weight:500}
.todo-list{display:flex;flex-direction:column;gap:8px}
.todo-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;border-left:3px solid transparent;position:relative}
.todo-card.done{opacity:.45}
.todo-card.done .todo-title{text-decoration:line-through;color:var(--text3)}
.todo-card-top{display:flex;align-items:flex-start;gap:10px}
.check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px}
.check.checked{background:var(--text);border-color:var(--text);color:var(--bg)}
.todo-main{flex:1;min-width:0}
.todo-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:4px}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;background:var(--surface2);color:var(--text2)}
.p-high{background:#FCEBEB;color:#A32D2D}
.p-mid{background:#FAEEDA;color:#854F0B}
.p-low{background:#EAF3DE;color:#3B6D11}
.todo-title{font-size:14px;font-weight:500;margin-bottom:4px}
.todo-info{display:flex;gap:10px;font-size:12px;color:var(--text3)}
.actions{display:flex;gap:3px;margin-left:auto}
.icon-btn{width:28px;height:28px;border-radius:var(--radius);border:none;background:transparent;cursor:pointer;color:var(--text3)}
.empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px}
.urgent-red{background:#FCEBEB!important;border-left-color:#E24B4A!important}
.urgent-amber{border-left-color:#EF9F27!important}
.bg-amber{background:#FAEEDA!important}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:100;padding:1rem}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);width:100%;max-width:460px;padding:1.5rem}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
.form-row input, .form-row select, .form-row textarea{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);padding:8px 10px;font-size:13px;color:var(--text);outline:none}
.color-picker{display:flex;gap:8px;margin-top:5px}
.cp{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.cp.sel{border-color:var(--text)}
.sync-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px 14px;margin-bottom:1rem;display:flex;gap:8px;align-items:center}
.sync-bar input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;font-size:13px;font-family:monospace}
.sync-status{font-size:11px;color:var(--text3);margin-left:auto}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📋 할 일 목록</h1>
    <div class="stats">
      <div class="stat"><b id="s-total">0</b>전체</div>
      <div class="stat"><b id="s-done">0</b>완료</div>
      <div class="stat"><b id="s-arch">0</b>보관</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="progress-label" id="prog-label">완료 0%</div>
  </div>

  <div class="sync-bar">
    <span style="font-size:12px">🔗 공유 ID</span>
    <input type="text" id="share-id" placeholder="공유 ID 입력 또는 생성..." readonly>
    <button class="btn btn-sm" onclick="copyShareLink()">링크 복사</button>
    <button class="btn btn-sm" onclick="generateId()">새 ID 생성</button>
    <span class="sync-status" id="sync-status"></span>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="검색..." oninput="render()">
    </div>
    <select id="sort" onchange="render()">
      <option value="deadline">마감일 임박순</option>
      <option value="created">최신순</option>
      <option value="priority">우선순위순</option>
    </select>
    <button class="btn btn-primary" onclick="openModal()">+ 추가</button>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-main" onclick="switchTab('main')">진행 중</button>
    <button class="tab" id="tab-arch" onclick="switchTab('archive')">보관함</button>
  </div>

  <div class="todo-list" id="todo-list"></div>
</div>

<div class="overlay" id="modal" onclick="overlayClick(event)">
  <div class="modal">
    <h2 id="modal-h" style="font-size:16px; margin-bottom:15px">할 일 추가</h2>
    <div class="form-row"><label>과목</label><input id="f-subject" placeholder="과목 입력"></div>
    <div class="form-row"><label>할 일 *</label><input id="f-title" placeholder="할 일을 입력하세요"></div>
    <div class="form-row"><label>마감일</label><input type="date" id="f-deadline"></div>
    <div class="form-row">
      <label>우선순위</label>
      <select id="f-priority"><option value="mid">중간</option><option value="high">높음</option><option value="low">낮음</option></select>
    </div>
    <div class="form-row"><label>메모</label><textarea id="f-memo"></textarea></div>
    <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:15px">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveTodo()">저장</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAa80zSh4nWV1vNFcPfODUrZ8Wu005qkMk",
    authDomain: "todolist-tr170.firebaseapp.com",
    projectId: "todolist-tr170",
    storageBucket: "todolist-tr170.firebasestorage.app",
    messagingSenderId: "164831908667",
    appId: "1:164831908667:web:474ab208c353eea3d09d1e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 전역 변수 및 함수 설정
  window.db = db;
  window.firestoreDoc = doc;
  window.firestoreSet = setDoc;
  window.firestoreGet = getDoc;

  // Firebase 실시간 동기화 설정
  window.setupRealtimeSync = function(id) {
    onSnapshot(doc(db, "todo_lists", id), (docSnap) => {
      if (docSnap.exists()) {
        const cloudData = docSnap.data().todos || [];
        // 로컬 데이터와 다를 경우에만 업데이트 및 렌더링
        if (JSON.stringify(cloudData) !== JSON.stringify(window.todos)) {
          window.todos = cloudData;
          localStorage.setItem(storageKey(), JSON.stringify(window.todos));
          render();
        }
      }
    });
  };

  // 초기화 실행
  initShareId();
</script>

<script>
let todos = [];
let shareId = '';
let editId = null;
let curTab = 'main';

function storageKey() { return 'todos-v3:' + (shareId || 'local'); }

async function save() {
  localStorage.setItem(storageKey(), JSON.stringify(todos));
  if (shareId && window.db) {
    try {
      setStatus('☁️ 저장 중...');
      await window.firestoreSet(window.firestoreDoc(window.db, "todo_lists", shareId), { todos });
      setStatus('✅ 클라우드 저장됨');
    } catch (e) { setStatus('⚠️ 저장 실패'); }
  }
}

function load() {
  const raw = localStorage.getItem(storageKey());
  todos = raw ? JSON.parse(raw) : [];
}

function initShareId() {
  const params = new URLSearchParams(location.search);
  const pid = params.get('id');
  shareId = pid || localStorage.getItem('last-share-id') || '';
  
  if (shareId) {
    document.getElementById('share-id').value = shareId;
    localStorage.setItem('last-share-id', shareId);
    // Firebase 모듈이 로드된 후 실시간 동기화 시작
    const checkFirebase = setInterval(() => {
      if (window.setupRealtimeSync) {
        window.setupRealtimeSync(shareId);
        clearInterval(checkFirebase);
      }
    }, 100);
  }
  load();
  render();
}

function generateId() {
  const newId = 'todo-' + Math.random().toString(36).slice(2, 10);
  location.href = location.origin + location.pathname + '?id=' + newId;
}

function copyShareLink() {
  if (!shareId) { generateId(); return; }
  const url = location.href.split('?')[0] + '?id=' + shareId;
  navigator.clipboard.writeText(url).then(() => setStatus('📋 링크 복사 완료!'));
}

function setStatus(msg) {
  const el = document.getElementById('sync-status');
  el.textContent = msg;
  setTimeout(() => el.textContent = '', 3000);
}

// ─── UI & CRUD 로직 (기존과 동일) ──────────────────────────
function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sort').value;
  let list = todos.filter(t => curTab === 'archive' ? t.archived : !t.archived);
  
  if (q) list = list.filter(t => (t.title + t.subject).toLowerCase().includes(q));
  
  // 정렬
  if (sort === 'deadline') list.sort((a, b) => (a.deadline || '9999') > (b.deadline || '9999') ? 1 : -1);
  else if (sort === 'created') list.sort((a, b) => b.id - a.id);

  // 통계 업데이트
  document.getElementById('s-total').textContent = todos.filter(t => !t.archived).length;
  document.getElementById('s-done').textContent = todos.filter(t => !t.archived && t.done).length;
  
  const el = document.getElementById('todo-list');
  if (list.length === 0) {
    el.innerHTML = `<div class="empty">항목이 없습니다.</div>`;
    return;
  }

  el.innerHTML = list.map(t => {
    const isDone = t.done ? 'checked' : '';
    return `
      <div class="todo-card ${t.done ? 'done' : ''}">
        <div class="todo-card-top">
          <div class="check ${isDone}" onclick="toggleDone('${t.id}')">${t.done ? '✓' : ''}</div>
          <div class="todo-main">
            <div class="todo-meta">
              <span class="badge">${t.subject || '일반'}</span>
              <span class="badge p-${t.priority}">${t.priority}</span>
            </div>
            <div class="todo-title">${t.title}</div>
            <div class="todo-info">📅 ${t.deadline || '기한 없음'}</div>
          </div>
          <div class="actions">
            <button class="icon-btn" onclick="deleteTodo('${t.id}')">🗑️</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

function openModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function overlayClick(e) { if (e.target.id === 'modal') closeModal(); }

function saveTodo() {
  const title = document.getElementById('f-title').value;
  if (!title) return;
  const newTodo = {
    id: Date.now().toString(),
    subject: document.getElementById('f-subject').value,
    title: title,
    deadline: document.getElementById('f-deadline').value,
    priority: document.getElementById('f-priority').value,
    memo: document.getElementById('f-memo').value,
    done: false,
    archived: false
  };
  todos.push(newTodo);
  save(); closeModal(); render();
}

function toggleDone(id) {
  const t = todos.find(x => x.id === id);
  t.done = !t.done;
  save(); render();
}

function deleteTodo(id) {
  if (!confirm('삭제할까요?')) return;
  todos = todos.filter(x => x.id !== id);
  save(); render();
}

function switchTab(t) {
  curTab = t;
  document.getElementById('tab-main').classList.toggle('active', t === 'main');
  document.getElementById('tab-arch').classList.toggle('active', t === 'archive');
  render();
}
</script>
</body>
</html>
