<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>할 일 목록</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;--surface:#ffffff;--surface2:#f1efe8;
  --text:#1a1a18;--text2:#5f5e5a;--text3:#888780;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --radius:8px;--radius-lg:12px;
  --red:#E24B4A;--red-light:#FCEBEB;--red-dark:#A32D2D;
  --amber:#EF9F27;--amber-light:#FAEEDA;--amber-dark:#854F0B;
  --green:#639922;--green-light:#EAF3DE;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--surface:#28281f;--surface2:#333329;
    --text:#f0ede6;--text2:#b4b2a9;--text3:#888780;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
    --red-light:#3a1a1a;--amber-light:#2d2010;--green-light:#1a2a0a;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
a{color:inherit;text-decoration:none}

/* Layout */
.container{max-width:720px;margin:0 auto;padding:1.5rem 1rem 4rem}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.header h1{font-size:20px;font-weight:600;letter-spacing:-.3px}
.stats{display:flex;gap:6px}
.stat{background:var(--surface2);border-radius:var(--radius);padding:5px 10px;font-size:12px;color:var(--text2)}
.stat b{color:var(--text);margin-right:3px}

.progress-wrap{margin-bottom:1.25rem}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--text);border-radius:2px;transition:width .4s}
.progress-label{font-size:11px;color:var(--text3);margin-top:4px;text-align:right}

.toolbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.search-wrap{flex:1;min-width:140px;position:relative}
.search-wrap input{width:100%;padding-left:30px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px 8px 30px;font-size:13px;color:var(--text);outline:none;transition:border .15s}
.search-wrap input:focus{border-color:var(--border2)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
select{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;font-size:13px;color:var(--text);cursor:pointer;outline:none}
select:focus{border-color:var(--border2)}

.btn{padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;transition:background .15s,opacity .15s;white-space:nowrap}
.btn:hover{background:var(--surface2)}
.btn-primary{background:var(--text);color:var(--bg);border-color:transparent;font-weight:500}
.btn-primary:hover{opacity:.85}
.btn-sm{padding:5px 10px;font-size:12px}

.tabs{display:flex;gap:0;margin-bottom:1rem;border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;width:fit-content}
.tab{padding:6px 18px;font-size:13px;cursor:pointer;border:none;background:transparent;color:var(--text2);transition:background .15s;font-family:inherit}
.tab.active{background:var(--text);color:var(--bg);font-weight:500}

/* Cards */
.todo-list{display:flex;flex-direction:column;gap:8px}
.todo-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;transition:opacity .2s;border-left:3px solid transparent;position:relative}
.todo-card.done{opacity:.45}
.todo-card.done .todo-title{text-decoration:line-through;color:var(--text3)}
.todo-card-top{display:flex;align-items:flex-start;gap:10px}
.check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:11px;transition:background .15s,border .15s;background:transparent}
.check.checked{background:var(--text);border-color:var(--text);color:var(--bg)}
.todo-main{flex:1;min-width:0}
.todo-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:4px}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;background:var(--surface2);color:var(--text2)}
.p-high{background:#FCEBEB;color:#A32D2D}
.p-mid{background:#FAEEDA;color:#854F0B}
.p-low{background:#EAF3DE;color:#3B6D11}
.todo-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:4px;word-break:break-word}
.todo-info{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.dl{font-size:12px;color:var(--text3)}
.dl.overdue{color:var(--red-dark);font-weight:500}
.dl.today{color:var(--red);font-weight:500}
.dl.soon{color:var(--amber-dark);font-weight:500}
.memo{font-size:12px;color:var(--text3);font-style:italic;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:220px}
.actions{display:flex;gap:3px;margin-left:auto;flex-shrink:0}
.icon-btn{width:28px;height:28px;border-radius:var(--radius);border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text3);transition:background .15s}
.icon-btn:hover{background:var(--surface2)}

.empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px}

/* Color map for cards */
.bg-red{background:#FCEBEB!important}
.bg-amber{background:#FAEEDA!important}
.bg-green{background:#EAF3DE!important}
.bg-blue{background:#E6F1FB!important}
.bg-purple{background:#EEEDFE!important}
.bg-teal{background:#E1F5EE!important}
.bg-pink{background:#FBEAF0!important}
.bg-coral{background:#FAECE7!important}
.urgent-red{background:#FCEBEB!important;border-left-color:#E24B4A!important}
.urgent-amber{border-left-color:#EF9F27!important}
@media(prefers-color-scheme:dark){
  .bg-red,.urgent-red{background:#3a1a1a!important}
  .bg-amber,.urgent-amber{background:#2d2010!important}
  .bg-green{background:#1a2a0a!important}
  .bg-blue{background:#0a1e30!important}
  .bg-purple{background:#1c1a3a!important}
  .bg-teal{background:#0a2a20!important}
  .bg-pink{background:#2a0a18!important}
  .bg-coral{background:#2a1008!important}
}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:100;padding:1rem}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);width:100%;max-width:460px;padding:1.5rem;max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:600;margin-bottom:1.25rem}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500}
.form-row input,.form-row select,.form-row textarea{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);padding:8px 10px;font-size:13px;color:var(--text);outline:none;font-family:inherit;transition:border .15s}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--text3)}
.form-row textarea{min-height:64px;resize:vertical}
.color-picker{display:flex;gap:8px;flex-wrap:wrap;margin-top:5px}
.cp{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border .15s}
.cp:hover{transform:scale(1.1)}
.cp.sel{border-color:var(--text);transform:scale(1.15)}
.cp-none{background:var(--surface2);border:1.5px dashed var(--border2)!important}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border)}

/* Sync bar */
.sync-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px 14px;margin-bottom:1rem;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sync-bar input{flex:1;min-width:160px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;font-size:13px;color:var(--text);outline:none;font-family:monospace}
.sync-label{font-size:12px;color:var(--text2);white-space:nowrap}
.sync-status{font-size:11px;margin-left:auto;color:var(--text3)}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📋 할 일 목록</h1>
    <div class="stats">
      <div class="stat"><b id="s-total">0</b>전체</div>
      <div class="stat"><b id="s-done">0</b>완료</div>
      <div class="stat"><b id="s-arch">0</b>보관</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="progress-label" id="prog-label">완료 0%</div>
  </div>

  <div class="sync-bar">
    <span class="sync-label">🔗 공유 ID</span>
    <input type="text" id="share-id" placeholder="공유 ID 입력 또는 생성..." readonly>
    <button class="btn btn-sm" onclick="copyShareLink()">링크 복사</button>
    <button class="btn btn-sm" onclick="generateId()">새 ID 생성</button>
    <span class="sync-status" id="sync-status"></span>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="검색..." oninput="render()">
    </div>
    <select id="sort" onchange="render()">
      <option value="deadline">마감일 임박순</option>
      <option value="created">최신순</option>
      <option value="alpha">가나다순</option>
      <option value="subject">과목순</option>
      <option value="priority">우선순위순</option>
    </select>
    <select id="fsubj" onchange="render()"><option value="">전체 과목</option></select>
    <button class="btn btn-primary" onclick="openModal()">+ 추가</button>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-main" onclick="switchTab('main')">진행 중</button>
    <button class="tab" id="tab-arch" onclick="switchTab('archive')">보관함</button>
  </div>

  <div class="todo-list" id="todo-list"></div>
</div>

<div class="overlay" id="modal" onclick="overlayClick(event)">
  <div class="modal">
    <h2 id="modal-h">할 일 추가</h2>
    <div class="form-row"><label>과목</label><input id="f-subject" placeholder="예) 수학, 영어, 물리학..."></div>
    <div class="form-row"><label>할 일 *</label><input id="f-title" placeholder="할 일을 입력하세요"></div>
    <div class="form-row"><label>마감일</label><input type="date" id="f-deadline"></div>
    <div class="form-row">
      <label>우선순위</label>
      <select id="f-priority">
        <option value="mid">중간</option>
        <option value="high">높음</option>
        <option value="low">낮음</option>
      </select>
    </div>
    <div class="form-row"><label>메모</label><textarea id="f-memo" placeholder="추가 메모..."></textarea></div>
    <div class="form-row">
      <label>배경 색상</label>
      <div class="color-picker" id="color-picker">
        <div class="cp cp-none sel" data-c="" onclick="pickColor(this)" title="없음"></div>
        <div class="cp" style="background:#FCEBEB" data-c="red" onclick="pickColor(this)" title="빨강"></div>
        <div class="cp" style="background:#FAEEDA" data-c="amber" onclick="pickColor(this)" title="노랑"></div>
        <div class="cp" style="background:#EAF3DE" data-c="green" onclick="pickColor(this)" title="초록"></div>
        <div class="cp" style="background:#E6F1FB" data-c="blue" onclick="pickColor(this)" title="파랑"></div>
        <div class="cp" style="background:#EEEDFE" data-c="purple" onclick="pickColor(this)" title="보라"></div>
        <div class="cp" style="background:#E1F5EE" data-c="teal" onclick="pickColor(this)" title="민트"></div>
        <div class="cp" style="background:#FBEAF0" data-c="pink" onclick="pickColor(this)" title="분홍"></div>
        <div class="cp" style="background:#FAECE7" data-c="coral" onclick="pickColor(this)" title="코랄"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveTodo()">저장</button>
    </div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────
const PRIO_ORD={high:0,mid:1,low:2};
const PRIO_LBL={high:'높음',mid:'중간',low:'낮음'};
let todos=[];
let editId=null;
let selColor='';
let curTab='main';
let shareId='';
let syncTimer=null;

// ─── Storage key ─────────────────────────────────────────
function storageKey(){return 'todos-v3:'+(shareId||'local')}

// ─── Persist ─────────────────────────────────────────────
function save(){
  localStorage.setItem(storageKey(),JSON.stringify(todos));
  if(shareId)scheduleSyncOut();
}
function load(){
  const raw=localStorage.getItem(storageKey());
  todos=raw?JSON.parse(raw):[];
}

// ─── Share ID ─────────────────────────────────────────────
function initShareId(){
  // Check URL param first
  const params=new URLSearchParams(location.search);
  const pid=params.get('id');
  if(pid){
    shareId=pid;
    localStorage.setItem('last-share-id',pid);
  } else {
    shareId=localStorage.getItem('last-share-id')||'';
  }
  document.getElementById('share-id').value=shareId||'(ID 없음 — 이 기기에만 저장됨)';
  load();
  if(shareId)syncIn();
}

function generateId(){
  shareId='todo-'+Math.random().toString(36).slice(2,10);
  localStorage.setItem('last-share-id',shareId);
  document.getElementById('share-id').value=shareId;
  save();
  setStatus('✅ 새 ID 생성됨. 링크를 복사해 공유하세요.');
}

function copyShareLink(){
  if(!shareId){generateId();return}
  const url=location.href.split('?')[0]+'?id='+shareId;
  navigator.clipboard.writeText(url).then(()=>setStatus('📋 링크 복사 완료!')).catch(()=>{
    prompt('아래 링크를 복사하세요:', url);
  });
}

function setStatus(msg){
  const el=document.getElementById('sync-status');
  el.textContent=msg;
  setTimeout(()=>el.textContent='',3000);
}

// ─── Cloud Sync (JSONBin.io — free tier) ──────────────────
// 실제 배포 시 JSONBin API Key를 발급받아 아래에 입력하세요.
// https://jsonbin.io 에서 무료 가입 후 API Key 발급
const JSONBIN_KEY=''; // ← 여기에 API 키 입력

async function syncOut(){
  if(!shareId||!JSONBIN_KEY)return;
  try{
    setStatus('☁️ 저장 중...');
    const binId=localStorage.getItem('bin:'+shareId);
    let url='https://api.jsonbin.io/v3/b';
    let method='POST';
    if(binId){url+='/'+binId;method='PUT';}
    const res=await fetch(url,{
      method,
      headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY,'X-Bin-Name':shareId},
      body:JSON.stringify({todos})
    });
    const data=await res.json();
    if(!binId&&data.metadata?.id){
      localStorage.setItem('bin:'+shareId,data.metadata.id);
    }
    setStatus('✅ 저장됨');
  }catch(e){setStatus('⚠️ 저장 실패 (오프라인?)')}
}

async function syncIn(){
  if(!shareId||!JSONBIN_KEY)return;
  const binId=localStorage.getItem('bin:'+shareId);
  if(!binId)return;
  try{
    setStatus('☁️ 불러오는 중...');
    const res=await fetch('https://api.jsonbin.io/v3/b/'+binId+'/latest',{
      headers:{'X-Master-Key':JSONBIN_KEY}
    });
    if(!res.ok)return;
    const data=await res.json();
    if(data.record?.todos){
      todos=data.record.todos;
      localStorage.setItem(storageKey(),JSON.stringify(todos));
      render();
      setStatus('✅ 최신 데이터 로드됨');
    }
  }catch(e){setStatus('⚠️ 불러오기 실패')}
}

function scheduleSyncOut(){
  clearTimeout(syncTimer);
  syncTimer=setTimeout(syncOut,1500);
}

// ─── Date helpers ─────────────────────────────────────────
function todayStr(){return new Date().toISOString().slice(0,10)}
function diffDays(d){
  if(!d)return null;
  return Math.round((new Date(d)-new Date(todayStr()))/(86400000));
}

// ─── Tab ──────────────────────────────────────────────────
function switchTab(t){
  curTab=t;
  document.getElementById('tab-main').classList.toggle('active',t==='main');
  document.getElementById('tab-arch').classList.toggle('active',t==='archive');
  render();
}

// ─── Modal ────────────────────────────────────────────────
function openModal(id){
  editId=id||null;
  document.getElementById('modal-h').textContent=id?'할 일 수정':'할 일 추가';
  if(id){
    const t=todos.find(x=>x.id===id);
    document.getElementById('f-subject').value=t.subject||'';
    document.getElementById('f-title').value=t.title;
    document.getElementById('f-deadline').value=t.deadline||'';
    document.getElementById('f-priority').value=t.priority||'mid';
    document.getElementById('f-memo').value=t.memo||'';
    selColor=t.color||'';
  } else {
    ['f-subject','f-title','f-memo'].forEach(x=>document.getElementById(x).value='');
    document.getElementById('f-deadline').value='';
    document.getElementById('f-priority').value='mid';
    selColor='';
  }
  document.querySelectorAll('.cp').forEach(el=>el.classList.toggle('sel',el.dataset.c===selColor));
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),60);
}
function closeModal(){document.getElementById('modal').classList.remove('open');editId=null}
function overlayClick(e){if(e.target===document.getElementById('modal'))closeModal()}
function pickColor(el){
  document.querySelectorAll('.cp').forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel');selColor=el.dataset.c;
}

// ─── CRUD ─────────────────────────────────────────────────
function saveTodo(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){document.getElementById('f-title').focus();return}
  const d={
    subject:document.getElementById('f-subject').value.trim(),
    title,
    deadline:document.getElementById('f-deadline').value,
    priority:document.getElementById('f-priority').value,
    memo:document.getElementById('f-memo').value.trim(),
    color:selColor
  };
  if(editId){
    Object.assign(todos.find(x=>x.id===editId),d);
  } else {
    todos.unshift({id:Date.now().toString(),...d,done:false,archived:false,createdAt:Date.now()});
  }
  save();closeModal();render();
}
function toggleDone(id){
  const t=todos.find(x=>x.id===id);
  t.done=!t.done;
  t.doneAt=t.done?Date.now():null;
  save();render();
}
function deleteTodo(id){
  if(!confirm('삭제하시겠습니까?'))return;
  todos=todos.filter(x=>x.id!==id);
  save();render();
}
function restoreTodo(id){
  const t=todos.find(x=>x.id===id);
  t.archived=false;t.done=false;t.doneAt=null;
  save();render();
}
function autoArchive(){
  const td=todayStr();
  todos.forEach(t=>{if(!t.archived&&t.done&&t.deadline&&t.deadline<td)t.archived=true;});
}

// ─── Render ───────────────────────────────────────────────
function render(){
  autoArchive();
  const q=document.getElementById('search').value.toLowerCase();
  const sort=document.getElementById('sort').value;
  const fsubj=document.getElementById('fsubj').value;

  // subject dropdown
  const subjects=[...new Set(todos.filter(t=>t.subject).map(t=>t.subject))].sort((a,b)=>a.localeCompare(b,'ko'));
  const fsubjEl=document.getElementById('fsubj');
  const curSubj=fsubjEl.value;
  fsubjEl.innerHTML='<option value="">전체 과목</option>'+subjects.map(s=>`<option${s===curSubj?' selected':''}>${s}</option>`).join('');

  let list=todos.filter(t=>curTab==='archive'?t.archived:!t.archived);
  if(q)list=list.filter(t=>(t.title+' '+t.subject+' '+t.memo).toLowerCase().includes(q));
  if(fsubj)list=list.filter(t=>t.subject===fsubj);

  const FAR=new Date('9999-12-31');
  if(sort==='deadline')list.sort((a,b)=>(a.deadline?new Date(a.deadline):FAR)-(b.deadline?new Date(b.deadline):FAR));
  else if(sort==='created')list.sort((a,b)=>b.createdAt-a.createdAt);
  else if(sort==='alpha')list.sort((a,b)=>a.title.localeCompare(b.title,'ko'));
  else if(sort==='subject')list.sort((a,b)=>(a.subject||'ㅎ').localeCompare(b.subject||'ㅎ','ko'));
  else if(sort==='priority')list.sort((a,b)=>PRIO_ORD[a.priority||'mid']-PRIO_ORD[b.priority||'mid']);

  // stats
  const total=todos.filter(t=>!t.archived).length;
  const done=todos.filter(t=>!t.archived&&t.done).length;
  const arch=todos.filter(t=>t.archived).length;
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-arch').textContent=arch;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent='완료 '+pct+'%';

  const el=document.getElementById('todo-list');
  if(!list.length){
    el.innerHTML=`<div class="empty">${curTab==='archive'?'📦 보관된 항목이 없습니다.':'✨ 할 일이 없습니다. 추가해보세요!'}</div>`;
    return;
  }

  const isDeadlineSort=sort==='deadline';
  el.innerHTML=list.map(t=>{
    const diff=diffDays(t.deadline);
    let dlClass='dl';let dlText='';
    if(t.deadline){
      if(diff<0){dlClass+=' overdue';dlText=`📅 ${t.deadline} (${Math.abs(diff)}일 초과)`}
      else if(diff===0){dlClass+=' today';dlText='📅 오늘 마감!'}
      else if(diff<=3){dlClass+=' soon';dlText=`📅 ${t.deadline} (D-${diff})`}
      else{dlText=`📅 ${t.deadline} (D-${diff})`}
    }
    let cardClass='todo-card'+(t.done?' done':'');
    // background: user color takes priority; if deadline sort, apply urgency bg
    let extraClass='';
    if(t.color)extraClass=' bg-'+t.color;
    else if(isDeadlineSort){
      if(diff!==null&&diff<=0)extraClass=' urgent-red';
      else if(diff!==null&&diff<=3)extraClass=' bg-amber';
    }
    const isArch=curTab==='archive';
    const pClass={high:'p-high',mid:'p-mid',low:'p-low'}[t.priority||'mid'];
    return `<div class="${cardClass}${extraClass}">
      <div class="todo-card-top">
        ${!isArch?`<div class="check${t.done?' checked':''}" onclick="toggleDone('${t.id}')">${t.done?'✓':''}</div>`:'<div style="width:18px"></div>'}
        <div class="todo-main">
          <div class="todo-meta">
            ${t.subject?`<span class="badge">${t.subject}</span>`:''}
            <span class="badge ${pClass}">${PRIO_LBL[t.priority||'mid']}</span>
          </div>
          <div class="todo-title">${t.title}</div>
          <div class="todo-info">
            ${dlText?`<span class="${dlClass}">${dlText}</span>`:''}
            ${t.memo?`<span class="memo">💬 ${t.memo}</span>`:''}
          </div>
        </div>
        <div class="actions">
          ${isArch
            ?`<button class="icon-btn" onclick="restoreTodo('${t.id}')" title="복원">↩️</button>`
            :`<button class="icon-btn" onclick="openModal('${t.id}')" title="수정">✏️</button>`
          }
          <button class="icon-btn" onclick="deleteTodo('${t.id}')" title="삭제" style="color:var(--red)">🗑️</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ─── Init ─────────────────────────────────────────────────
initShareId();
render();
</script>
</body>
</html>
